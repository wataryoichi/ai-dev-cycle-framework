name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.html'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install devcycle
        run: pip install -e .

      - name: Run review
        id: review
        run: |
          devcycle turbo \
            --title "PR review: ${PR_TITLE}" \
            --cycles 1 \
            --max-fix-rounds 1 \
            --no-push \
            --json > result.json 2>stderr.txt || true

          # Extract state
          STATE=$(python3 -c "import json; print(json.load(open('result.json')).get('state','error'))" 2>/dev/null || echo "error")
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          DEVCYCLE_CLAUDE_CMD: ${{ secrets.DEVCYCLE_CLAUDE_CMD }}
          DEVCYCLE_CODEX_CMD: ${{ secrets.DEVCYCLE_CODEX_CMD }}

      - name: Post review comment
        if: steps.review.outputs.state != 'error'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary = '## AI Review Summary\n\n';

            // Read result
            try {
              const result = JSON.parse(fs.readFileSync('result.json', 'utf8'));
              summary += `**State:** \`${result.state || 'unknown'}\`\n`;
              summary += `**Stopped:** \`${result.stopped_reason || 'unknown'}\`\n\n`;
            } catch(e) {
              summary += 'Could not parse result.\n\n';
            }

            // Include findings if review exists
            const reviewPath = 'ops/dev-cycles';
            const dirs = fs.readdirSync(reviewPath).filter(d =>
              fs.statSync(`${reviewPath}/${d}`).isDirectory()
            ).sort().reverse();

            if (dirs.length > 0) {
              const latestDir = `${reviewPath}/${dirs[0]}`;
              const reviewFile = `${latestDir}/codex-review.md`;
              if (fs.existsSync(reviewFile)) {
                const review = fs.readFileSync(reviewFile, 'utf8');
                summary += '<details><summary>Codex Review</summary>\n\n';
                summary += review + '\n</details>\n';
              }
            }

            summary += '\n---\n*Generated by [devcycle](https://github.com/wataryoichi/ai-dev-cycle-framework)*';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ github.event.pull_request.number }}
          path: |
            ops/dev-cycles/
            result.json
          retention-days: 14
